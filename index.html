<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Daily Bullet Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'Meiryo', sans-serif;
  background: #4a7a8a center center / cover no-repeat fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
}

/* ===== 左：本棚パネル ===== */
#book-panel {
  position: fixed;
  top: 50%;
  left: calc(50% - 105mm - 30px - 148px);
  transform: translateY(-50%);
  width: 148px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 1;
}
#book-cover-wrap {
  width: 148px;
  height: 210px;
  position: relative;
}
#book-cover-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 3px;
  box-shadow: 4px 6px 20px rgba(0,0,0,0.45);
  display: block;
}
/* 本の背表紙ライン */
#book-cover-wrap::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 10px;
  width: 6px;
  background: linear-gradient(to right, rgba(0,0,0,0.25), rgba(0,0,0,0.05));
  border-radius: 2px 0 0 2px;
  z-index: 1;
}
#book-meta {
  width: 100%;
  text-align: center;
}
#book-title {
  font-size: 10px;
  color: rgba(255,255,255,0.75);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 3px;
  font-family: 'Shippori Mincho', serif;
}
#book-author {
  font-size: 9px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 8px;
}
#book-links {
  display: flex;
  gap: 6px;
  justify-content: center;
}
#book-links a {
  font-size: 9px;
  color: rgba(255,255,255,0.55);
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 3px;
  padding: 2px 7px;
  transition: background 0.2s;
}
#book-links a:hover {
  background: rgba(255,255,255,0.15);
  color: white;
}

/* ===== 中央：コントロール＋用紙 ===== */
#center-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 1;
  position: relative;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.15);
  z-index: 0;
  pointer-events: none;
}
#bg-text {
  position: fixed;
  top: 50%;
  left: calc(50% + 105mm + 30px);
  right: 20px;
  max-width: calc(50vw - 105mm - 50px);
  transform: translateY(-50%);
  z-index: 0;
  pointer-events: none;
  text-align: left;
  word-break: break-word;
  font-family: 'Shippori Mincho', 'Segoe Script', 'Brush Script MT', serif;
  font-size: clamp(28px, 4vw, 64px);
  font-weight: bold;
  color: rgba(255,255,255,0.55);
  line-height: 1.5;
  letter-spacing: 0.05em;
  user-select: none;
  white-space: pre-line;
  text-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
#controls, #page {
  position: relative;
  z-index: 1;
}

/* ===== コントロールバー ===== */
#controls {
  width: 210mm;
  max-width: 100%;
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  align-items: center;
  flex-wrap: wrap;
}
#controls button {
  padding: 5px 14px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 13px;
  background: #5b7fa6;
  color: white;
}
#controls button:hover { background: #3d5f80; }
#signin-btn { background: #c0392b !important; }
#signin-btn:hover { background: #922b21 !important; }
#user-info { font-size: 11px; color: #666; margin-left: auto; }

/* ===== A4用紙 ===== */
#page {
  width: 210mm;
  height: 297mm;
  background: #fffff8;
  box-shadow: 0 4px 24px rgba(0,0,0,0.28);
  padding: 10mm 10mm 8mm 20mm;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== 縦線 2本：body-rows に限定 ===== */
#body-rows {
  position: relative;
}
#body-rows::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 8mm;
  width: 0;
  border-left: 1.2px solid rgba(176,48,48,0.55);
  pointer-events: none;
}
#body-rows::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 34mm;
  width: 0;
  border-left: 1px solid rgba(176,48,48,0.28);
  pointer-events: none;
}

/* ===== ヘッダー ===== */
#header {
  display: flex;
  align-items: baseline;
  padding-bottom: 3px;
  border-bottom: 2.5px solid #2c2c2c;
  margin-bottom: 1px;
}
#header-line2 {
  border-bottom: 1px solid #2c2c2c;
  margin-bottom: 3px;
}

#date-display {
  font-family: 'Segoe Script', 'Brush Script MT', cursive;
  font-size: 20px;
  color: #1a1a1a;
  white-space: nowrap;
  min-width: 110px;
  letter-spacing: 0.5px;
}

.hfields {
  display: flex;
  flex: 1;
  align-items: baseline;
  gap: 0 10px;
  padding-left: 10px;
  flex-wrap: nowrap;
}
.hf {
  display: flex;
  align-items: baseline;
  gap: 2px;
  white-space: nowrap;
}
.hf label {
  font-family: 'Segoe Script', cursive;
  font-size: 13px;
  color: #333;
}
.hf input {
  width: 36px;
  border: none;
  background: transparent;
  font-size: 12px;
  outline: none;
  padding: 0 2px 1px;
  color: #111;
  font-family: 'Segoe Script', cursive;
}
.hf.wx input { width: 96px; }
.hf.st input { width: 42px; }
.hf.no { margin-left: auto; }
.hf.no input { width: 44px; text-align: right; }

/* ===== タイトル行 ===== */
#title-row {
  display: flex;
  align-items: center;
  border-bottom: 2px solid #7a9fc0;
  min-height: 9mm;
  padding: 2px 0 2px 2px;
}
#title-row .title-label {
  font-family: 'Segoe Script', cursive;
  font-size: 20px;
  color: #888;
  white-space: nowrap;
  margin-right: 6px;
  flex-shrink: 0;
}
#title-row input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 14px;
  font-family: 'Segoe Script', cursive;
  color: #1a3a5c;
  outline: none;
}

/* ===== 本文行 ===== */
#body-rows {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-bottom: 2px solid #7a9fc0;
}

.row {
  display: flex;
  align-items: flex-end;
  border-bottom: 1px solid #c0ccd8;
  flex: 1;
  min-height: 0;
  position: relative;
}
.row.has-event { border-bottom-color: #a0b0c4; }

.col-bullet {
  width: 8mm;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: center;
  color: #222;
  font-size: 17px;
  line-height: 1;
  flex-shrink: 0;
}

.col-time {
  width: 26mm;
  padding: 0 3px 1px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
}
.col-time input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 10.5px;
  color: #666;
  outline: none;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
}

.col-detail {
  flex: 1;
  display: flex;
  align-items: flex-end;
  padding: 0 5px 1px;
  overflow: hidden;
}
.col-calname {
  font-size: 9.5px;
  white-space: nowrap;
  margin-right: 5px;
  flex-shrink: 0;
  font-style: italic;
}
.col-detail input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 12px;
  color: #111;
  outline: none;
  min-width: 0;
  font-family: 'Segoe UI', 'Meiryo', sans-serif;
}

.row.empty-row .col-time input { color: #ddd; }
.row.empty-row .col-detail input { color: #ddd; }

/* ===== 日付ナビ ===== */
#date-nav {
  width: 210mm;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.nav-btn {
  padding: 4px 12px;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 4px;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 12px;
  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.2s;
}
.nav-btn:hover { background: rgba(255,255,255,0.3); }
.nav-btn.active { background: rgba(255,255,255,0.45); color: #222; font-weight: bold; }
#date-nav button:first-child,
#date-nav button:last-child { padding: 4px 8px; }

/* ===== 週表示：複数ページ ===== */
#week-pages { display: none; }
#week-pages .week-page {
  width: 210mm;
  height: 297mm;
  background: #fffff8;
  box-shadow: 0 4px 24px rgba(0,0,0,0.28);
  padding: 10mm 10mm 8mm 20mm;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  margin-bottom: 20px;
}
#week-pages .week-page .wp-body {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  border-bottom: 2px solid #7a9fc0;
}
#week-pages .week-page .wp-body::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 8mm;
  width: 0;
  border-left: 1.2px solid rgba(176,48,48,0.55);
  pointer-events: none;
}
#week-pages .week-page .wp-body::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 34mm;
  width: 0;
  border-left: 1px solid rgba(176,48,48,0.28);
  pointer-events: none;
}

/* ===== 印刷 ===== */
@media print {
  @page { size: A4; margin: 0; }
  body { background: white; padding: 0; }
  #controls, #date-nav, #bg-text, #book-panel { display: none !important; }
  #page { box-shadow: none; }
  #week-pages .week-page { box-shadow: none; page-break-after: always; }
  .col-time input { color: #aaa !important; }
  .col-calname { color: #bbb !important; }
  .row.empty-row .col-time input,
  .row.empty-row .col-detail input { color: transparent !important; }
  input { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

  <div id="body-rows"></div>

</div><!-- /page -->

<div id="week-pages"></div>

</div><!-- /center-col -->

<script>
(async function() {
  const CACHE_KEY = 'journal_book_v5';
  const CACHE_TTL = 24 * 60 * 60 * 1000;

  /* 2022〜2024年 本屋大賞・直木賞・ベストセラー */
  const fallback = [
    { title: '成瀬は天下を取りにいく',      author: '宮島未奈'   },
    { title: '汝、星のごとく',            author: '凪良ゆう'   },
    { title: '同志少女よ、敵を撃て',        author: '逢坂冬馬'   },
    { title: '黒牢城',                   author: '米澤穂信'   },
    { title: '推し、燃ゆ',               author: '宇佐見りん' },
    { title: 'ラブカは静かに弓を持つ',      author: '安壇美緒'   },
    { title: '水車小屋のネネ',            author: '津村記久子' },
    { title: '君が手にするはずだった黄金について', author: '小川哲' },
    { title: '存在のすべてを',            author: '塩田武士'   },
    { title: '光のとこにいてね',           author: '一穂ミチ'   },
    { title: 'ゴールデンスランバー',        author: '伊坂幸太郎' },
    { title: 'DIE WITH ZERO',           author: 'ビル・パーキンス' },
    { title: 'THE TEAM 5つの法則',      author: '麻野耕司'   },
    { title: '言語化の魔力',             author: '樺沢紫苑'   },
    { title: 'ライフシフト２',            author: 'リンダ・グラットン' },
  ];

  function showBook(b) {
    const panel = document.getElementById('book-panel');
    panel.style.display = '';
    const imgEl = document.getElementById('book-img');
    imgEl.src = b.imgUrl;
    imgEl.onerror = () => { panel.style.display = 'none'; };
    document.getElementById('book-title').textContent = b.title;
    document.getElementById('book-author').textContent = b.author;
    setLinks(b.title, b.author);
  }

  function setLinks(title, author) {
    document.getElementById('book-amazon').href =
      `https://www.amazon.co.jp/s?k=${encodeURIComponent(title + ' ' + author)}`;
    document.getElementById('book-search').href =
      `https://www.google.com/search?q=${encodeURIComponent(title + ' ' + author)}`;
  }

  /* キャッシュ確認 */
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (cached && Date.now() - cached.ts < CACHE_TTL) { showBook(cached); return; }
  } catch(_) {}

  /* Google Books API で日本語書籍を検索 */
  const queries = [
    '成瀬は天下を取りにいく','汝、星のごとく','同志少女よ、敵を撃て',
    '黒牢城 米澤穂信','推し、燃ゆ','水車小屋のネネ',
    '存在のすべてを 塩田武士','光のとこにいてね','言語化の魔力',
    'ライフシフト２ 日本語',
  ];
  const q = queries[Math.floor(Math.random() * queries.length)];
  try {
    const res = await fetch(
      `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=5&langRestrict=ja&printType=books`
    );
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const items = (data.items || []).filter(v => v.volumeInfo.imageLinks);
    if (!items.length) throw new Error('no items');
    const item = items[0];
    const info = item.volumeInfo;
    const links = info.imageLinks;
    const imgUrl = (links.medium || links.thumbnail)
      .replace('http://', 'https://')
      .replace('zoom=1', 'zoom=2');
    const b = {
      imgUrl, title: info.title || '',
      author: (info.authors||[]).slice(0,1).join(''),
      ts: Date.now(),
    };
    localStorage.setItem(CACHE_KEY, JSON.stringify(b));
    showBook(b);
  } catch(e) {
    document.getElementById('book-panel').style.display = 'none';
  }
})();

/* ===== 日付管理 ===== */
const DAYS_JA = ['日','月','火','水','木','金','土'];
const DAYS_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let currentDate = new Date();
let weekMode = false;

function dateOnly(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}
function fmtHeader(d) {
  return `${d.getMonth()+1}/${d.getDate()}  (${DAYS_EN[d.getDay()]})`;
}

function setNavActive(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function selectDay(offset) {
  weekMode = false;
  currentDate = addDays(dateOnly(new Date()), offset);
  document.getElementById('page').style.display = '';
  document.getElementById('week-pages').style.display = 'none';
  document.getElementById('date-display').textContent = fmtHeader(currentDate);
  const btns = document.querySelectorAll('.nav-btn');
  if (offset === 0) setNavActive(btns[1]);
  else if (offset === 1) setNavActive(btns[2]);
  else if (offset === 2) setNavActive(btns[3]);
  else setNavActive(null);
  if (accessToken) loadCalendarFor(currentDate);
  else render();
}

function shiftDay(n) {
  if (weekMode) return;
  currentDate = addDays(currentDate, n);
  document.getElementById('date-display').textContent = fmtHeader(currentDate);
  setNavActive(null);
  if (accessToken) loadCalendarFor(currentDate);
  else render();
}

function selectDate(val) {
  if (!val) return;
  weekMode = false;
  const [y,m,d] = val.split('-').map(Number);
  currentDate = new Date(y, m-1, d);
  document.getElementById('page').style.display = '';
  document.getElementById('week-pages').style.display = 'none';
  document.getElementById('date-display').textContent = fmtHeader(currentDate);
  setNavActive(null);
  if (accessToken) loadCalendarFor(currentDate);
  else render();
}

async function selectWeek() {
  weekMode = true;
  setNavActive(document.querySelectorAll('.nav-btn')[4]);
  document.getElementById('page').style.display = 'none';
  const wp = document.getElementById('week-pages');
  wp.style.display = '';
  wp.innerHTML = '<p style="color:white;padding:10px">読み込み中...</p>';

  const today = dateOnly(new Date());
  const dow = today.getDay();
  const monday = addDays(today, -dow + (dow === 0 ? -6 : 1));

  const pages = [];
  for (let i = 0; i < 7; i++) {
    const day = addDays(monday, i);
    let events = [];
    if (accessToken) events = await fetchEventsFor(day);
    pages.push({ day, events });
  }

  wp.innerHTML = '';
  for (const { day, events } of pages) {
    wp.appendChild(buildWeekPage(day, events));
  }
}

function buildWeekPage(day, events) {
  const pg = document.createElement('div');
  pg.className = 'week-page';

  // ヘッダー
  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:baseline;padding-bottom:3px;border-bottom:2.5px solid #2c2c2c;margin-bottom:1px;';
  hdr.innerHTML = `<div style="font-family:'Segoe Script',cursive;font-size:20px;min-width:110px">${fmtHeader(day)}</div>`;
  pg.appendChild(hdr);
  const line2 = document.createElement('div');
  line2.style.cssText = 'border-bottom:1px solid #2c2c2c;margin-bottom:3px;';
  pg.appendChild(line2);

  // タイトル行
  const tr = document.createElement('div');
  tr.style.cssText = 'display:flex;align-items:center;border-bottom:2px solid #7a9fc0;min-height:9mm;padding:2px 0;';
  tr.innerHTML = `<span style="font-family:'Segoe Script',cursive;font-size:20px;color:#888;margin-right:6px">Title:</span><input type="text" style="flex:1;border:none;background:transparent;font-size:14px;font-family:'Segoe Script',cursive;color:#1a3a5c;outline:none"/>`;
  pg.appendChild(tr);

  // 本文
  const body = document.createElement('div');
  body.className = 'wp-body';
  for (let i = 0; i < 25; i++) {
    const ev = events[i];
    body.appendChild(ev
      ? makeRow(ev.timeStr, ev.calname, ev.detail)
      : makeRow());
  }
  pg.appendChild(body);
  return pg;
}

/* 初期表示 */
document.getElementById('date-display').textContent = fmtHeader(currentDate);

let calColorMap = {};

function makeRow(time, calname, detail) {
  const empty = !time && !detail;
  const row = document.createElement('div');
  row.className = 'row' + (empty ? ' empty-row' : ' has-event');

  const b = document.createElement('div');
  b.className = 'col-bullet';
  b.textContent = '•';
  row.appendChild(b);

  const ct = document.createElement('div');
  ct.className = 'col-time';
  const it = document.createElement('input');
  it.type = 'text';
  it.value = time || '';
  ct.appendChild(it);
  row.appendChild(ct);

  const cd = document.createElement('div');
  cd.className = 'col-detail';
  if (calname) {
    const sp = document.createElement('span');
    sp.className = 'col-calname';
    sp.textContent = calname;
    sp.style.color = calColorMap[calname] || '#888';
    cd.appendChild(sp);
  }
  const id = document.createElement('input');
  id.type = 'text';
  id.value = detail || '';
  cd.appendChild(id);
  row.appendChild(cd);

  [it, id].forEach(el => el.addEventListener('input', () => {
    row.classList.remove('empty-row');
    row.classList.add('has-event');
  }));
  return row;
}

function render(events = []) {
  const container = document.getElementById('body-rows');
  container.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const ev = events[i];
    container.appendChild(ev ? makeRow(ev.timeStr, ev.calname, ev.detail) : makeRow());
  }
}
render();

const CLIENT_ID = '616683928852-chp1t7qqigfeeuolpcjbc8e14uueka8i.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';
let tokenClient, accessToken;

function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
    });
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) return;
        accessToken = resp.access_token;
        loadCalendar();
      },
    });
  });
}

function handleSignIn() {
  if (!tokenClient) { alert('Google APIの読み込み中です。少し待ってから再試行してください。'); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

const googleColors = {
  '1':'#a4bdfc','2':'#7ae7bf','3':'#dbadff','4':'#ff887c',
  '5':'#fbd75b','6':'#ffb878','7':'#46d6db','8':'#e1e1e1',
  '9':'#5484ed','10':'#51b749','11':'#dc2127'
};

async function fetchEventsFor(day) {
  const start = new Date(day.getFullYear(), day.getMonth(), day.getDate()).toISOString();
  const end   = new Date(day.getFullYear(), day.getMonth(), day.getDate() + 1).toISOString();
  const calList = await gapi.client.calendar.calendarList.list();
  const cals = calList.result.items || [];

  calColorMap = {};
  for (const cal of cals) {
    calColorMap[cal.summary] = cal.backgroundColor ||
      (cal.colorId ? googleColors[cal.colorId] : '#888');
  }

  const results = await Promise.all(cals.map(cal =>
    gapi.client.calendar.events.list({
      calendarId: cal.id, timeMin: start, timeMax: end,
      singleEvents: true, orderBy: 'startTime',
    }).then(r => ({ cal, events: r.result.items || [] }))
  ));

  const allEvents = [];
  for (const { cal, events } of results) {
    for (const ev of events) {
      const timeStr = ev.start.dateTime
        ? `${fmt(ev.start.dateTime)}〜${fmt(ev.end.dateTime)}`
        : '終日';
      allEvents.push({ timeStr, calname: cal.summary, detail: ev.summary || '', _sort: ev.start.dateTime || ev.start.date });
    }
  }
  allEvents.sort((a, b) => a._sort.localeCompare(b._sort));
  return allEvents;
}

async function loadCalendarFor(day) {
  if (!accessToken) return;
  try {
    const events = await fetchEventsFor(day);
    render(events);
    try {
      const me = await gapi.client.request({ path: 'https://www.googleapis.com/oauth2/v3/userinfo' });
      document.getElementById('user-info').textContent = me.result.email || '';
    } catch(_) {}
  } catch(e) {
    alert('読み込みエラー: ' + e.message);
  }
}

function loadCalendar() { loadCalendarFor(currentDate); }

function fmt(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
