<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Daily Bullet Journal</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'Meiryo', sans-serif;
  background: #4a7a8a center center / cover no-repeat fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.15);
  z-index: 0;
  pointer-events: none;
}

/* ===== コントロール類 ===== */
#center-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 1;
  position: relative;
}
#controls {
  width: 210mm;
  max-width: 100%;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
#controls button {
  padding: 5px 14px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 13px;
  background: #5b7fa6;
  color: white;
}
#controls button:hover { background: #3d5f80; }
#signin-btn { background: #c0392b !important; }
#signin-btn:hover { background: #922b21 !important; }
#user-info { font-size: 11px; color: rgba(255,255,255,0.8); margin-left: auto; }

/* ===== 日付ナビ ===== */
#date-nav {
  width: 210mm;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.nav-btn {
  padding: 4px 12px;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 4px;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 12px;
  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.2s;
}
.nav-btn:hover { background: rgba(255,255,255,0.3); }
.nav-btn.active { background: rgba(255,255,255,0.45); color: #222; font-weight: bold; }
.nav-arrow { padding: 4px 8px; }

/* ===== 週ナビ（今週モード時に表示）===== */
#week-nav {
  display: none;
  gap: 10px;
  align-items: center;
}
#week-nav.visible { display: flex; }
#week-nav button {
  padding: 5px 16px;
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 4px;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 14px;
  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.2s;
}
#week-nav button:hover { background: rgba(255,255,255,0.35); }
#week-nav button:disabled { opacity: 0.3; cursor: default; }
#week-nav-label {
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  min-width: 120px;
  text-align: center;
  font-weight: bold;
}

/* ===== A4用紙 ===== */
#page {
  width: 210mm;
  height: 297mm;
  background: #fffff8;
  box-shadow: 0 4px 24px rgba(0,0,0,0.28);
  padding: 10mm 10mm 8mm 20mm;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== 縦線 2本 ===== */
#body-rows {
  position: relative;
}
#body-rows::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 8mm;
  width: 0;
  border-left: 1.2px solid rgba(176,48,48,0.55);
  pointer-events: none;
}
#body-rows::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 34mm;
  width: 0;
  border-left: 1px solid rgba(176,48,48,0.28);
  pointer-events: none;
}

/* ===== ヘッダー ===== */
#header {
  display: flex;
  align-items: baseline;
  padding-bottom: 3px;
  border-bottom: 2.5px solid #2c2c2c;
  margin-bottom: 1px;
}
#header-line2 {
  border-bottom: 1px solid #2c2c2c;
  margin-bottom: 3px;
}
#date-display {
  font-family: 'Segoe Script', 'Brush Script MT', cursive;
  font-size: 20px;
  color: #1a1a1a;
  white-space: nowrap;
  min-width: 110px;
  letter-spacing: 0.5px;
}
.hfields {
  display: flex;
  flex: 1;
  align-items: baseline;
  gap: 0 10px;
  padding-left: 10px;
  flex-wrap: nowrap;
}
.hf {
  display: flex;
  align-items: baseline;
  gap: 2px;
  white-space: nowrap;
}
.hf label {
  font-family: 'Segoe Script', cursive;
  font-size: 13px;
  color: #333;
}
.hf input {
  width: 36px;
  border: none;
  background: transparent;
  font-size: 12px;
  outline: none;
  padding: 0 2px 1px;
  color: #111;
  font-family: 'Segoe Script', cursive;
}
.hf.wx input { width: 96px; }
.hf.st input { width: 42px; }
.hf.no { margin-left: auto; }
.hf.no input { width: 44px; text-align: right; }

/* ===== タイトル行 ===== */
#title-row {
  display: flex;
  align-items: center;
  border-bottom: 2px solid #7a9fc0;
  min-height: 9mm;
  padding: 2px 0 2px 2px;
}
#title-row .title-label {
  font-family: 'Segoe Script', cursive;
  font-size: 20px;
  color: #888;
  white-space: nowrap;
  margin-right: 6px;
  flex-shrink: 0;
}
#title-row input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 14px;
  font-family: 'Segoe Script', cursive;
  color: #1a3a5c;
  outline: none;
}

/* ===== 本文行 ===== */
#body-rows {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-bottom: 2px solid #7a9fc0;
}
.row {
  display: flex;
  align-items: flex-end;
  border-bottom: 1px solid #c0ccd8;
  flex: 1;
  min-height: 0;
  position: relative;
}
.row.has-event { border-bottom-color: #a0b0c4; }
.col-bullet {
  width: 8mm;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: center;
  color: #222;
  font-size: 17px;
  line-height: 1;
  flex-shrink: 0;
}
.col-time {
  width: 26mm;
  padding: 0 3px 1px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
}
.col-time input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 10.5px;
  color: #666;
  outline: none;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
}
.col-detail {
  flex: 1;
  display: flex;
  align-items: flex-end;
  padding: 0 5px 1px;
  overflow: hidden;
}
.col-calname {
  font-size: 9.5px;
  white-space: nowrap;
  flex-shrink: 0;
  font-style: italic;
  border: none;
  background: transparent;
  outline: none;
  padding: 0 2px 1px 0;
  font-family: 'Segoe UI', 'Meiryo', sans-serif;
  width: 26mm;   /* 縦罫線間と同じ幅 */
  min-width: 26mm;
  box-sizing: content-box;
}
.col-detail input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 12px;
  color: #111;
  outline: none;
  min-width: 0;
  font-family: 'Segoe UI', 'Meiryo', sans-serif;
}
/* 行削除ボタン */
.col-del {
  width: 0;
  overflow: visible;
  position: relative;
  flex-shrink: 0;
  align-self: center;
}
.col-del button {
  display: none;
  position: absolute;
  right: 2px;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: rgba(180,60,60,0.12);
  color: #b03030;
  border-radius: 3px;
  font-size: 10px;
  line-height: 1;
  padding: 1px 4px;
  cursor: pointer;
  white-space: nowrap;
}
.row:hover .col-del button { display: block; }
.col-del button:hover { background: rgba(180,60,60,0.28); }

.row.empty-row .col-time input { color: #ddd; }
.row.empty-row .col-detail input { color: #ddd; }
@media print { .col-del { display: none; } }

/* ===== 週ビュー：スクロールスナップ ===== */
/* ビューポート：2ページ分の幅でクリップ */
#week-viewer {
  display: none;
  width: calc(210mm * 2 + 20px);
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
#week-viewer::-webkit-scrollbar { display: none; }
#week-viewer.visible { display: flex; }

/* レール：7枚を横一列 */
#week-track {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-shrink: 0;
}

.week-page {
  width: 210mm;
  height: 297mm;
  background: #fffff8;
  box-shadow: 0 4px 24px rgba(0,0,0,0.28);
  padding: 10mm 10mm 8mm 20mm;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  scroll-snap-align: start;
}
.wp-hdr {
  display: flex;
  align-items: baseline;
  padding-bottom: 3px;
  border-bottom: 2.5px solid #2c2c2c;
  margin-bottom: 1px;
}
.wp-hdr2 {
  border-bottom: 1px solid #2c2c2c;
  margin-bottom: 3px;
}
.wp-title {
  display: flex;
  align-items: center;
  border-bottom: 2px solid #7a9fc0;
  min-height: 9mm;
  padding: 2px 0;
}
.wp-body {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  border-bottom: 2px solid #7a9fc0;
}
.wp-body::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 8mm;
  width: 0;
  border-left: 1.2px solid rgba(176,48,48,0.55);
  pointer-events: none;
}
.wp-body::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 34mm;
  width: 0;
  border-left: 1px solid rgba(176,48,48,0.28);
  pointer-events: none;
}

/* ===== 印刷 ===== */
@media print {
  @page { size: A4; margin: 0; }
  body { background: white; padding: 0; }
  #controls, #date-nav, #week-nav { display: none !important; }
  #page { box-shadow: none; }
  #week-viewer { display: none !important; }
  #week-viewer.visible { display: block !important; overflow: visible; width: auto; }
  #week-track { display: block; }
  .week-page { box-shadow: none; page-break-after: always; width: 210mm; height: 297mm; }
  .col-time input { color: #aaa !important; }
  .col-calname { color: #bbb !important; }
  .row.empty-row .col-time input,
  .row.empty-row .col-detail input { color: transparent !important; }
  input { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<div id="center-col">
<div id="controls">
  <button id="signin-btn" onclick="handleSignIn()">Googleでサインイン</button>
  <button onclick="window.print()">🖨 印刷</button>
  <span id="user-info"></span>
</div>
<div id="date-nav">
  <button class="nav-btn nav-arrow" onclick="shiftDay(-1)">◀</button>
  <button class="nav-btn active" id="btn-today" onclick="selectDay(0)">今日</button>
  <button class="nav-btn" id="btn-tomorrow" onclick="selectDay(1)">明日</button>
  <button class="nav-btn" id="btn-dayafter" onclick="selectDay(2)">明後日</button>
  <button class="nav-btn" id="btn-week" onclick="selectWeek()">今週</button>
  <button class="nav-btn" onclick="document.getElementById('date-picker').showPicker?.() || document.getElementById('date-picker').click()">📅 日付指定</button>
  <input type="date" id="date-picker" onchange="selectDate(this.value)" style="display:none"/>
  <button class="nav-btn nav-arrow" onclick="shiftDay(1)">▶</button>
</div>
<div id="week-nav">
  <button id="week-shift-prev" onclick="shiftWeek(-1)">◀◀ 前週</button>
  <button id="week-prev" onclick="shiftWeekPair(-1)">◀</button>
  <span id="week-nav-label"></span>
  <button id="week-next" onclick="shiftWeekPair(1)">▶</button>
  <button id="week-shift-next" onclick="shiftWeek(1)">翌週 ▶▶</button>
</div>

<div id="page">
  <div id="header">
    <div id="date-display"></div>
    <div class="hfields">
      <span class="hf wx"><label>WX:</label><input type="text"/></span>
      <span class="hf"><label>PS:</label><input type="text"/></span>
      <span class="hf"><label>MS:</label><input type="text"/></span>
      <span class="hf st"><label>ST:</label><input type="text"/></span>
      <span class="hf"><label>feel:</label><input type="text"/></span>
      <span class="hf no"><label>No.</label><input type="text"/></span>
    </div>
  </div>
  <div id="header-line2"></div>
  <div id="title-row">
    <span class="title-label">Title:</span>
    <input type="text"/>
  </div>
  <div id="body-rows"></div>
</div><!-- /page -->

<div id="week-viewer"><div id="week-track"></div></div>

</div><!-- /center-col -->

<script>
/* ===== 背景（Pexels）===== */
(async function() {
  const KEY = 'JK8iPRF0Qq6bMAIicPJ5mpHPokHDWNclw4hvrMzgvTOxbwpLjkxEnW8S';
  const qs = ['nature landscape','mountain sunrise','ocean beach morning','forest light','lake reflection','cherry blossom japan','green field sky'];
  const q = qs[Math.floor(Math.random() * qs.length)];
  try {
    const res = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(q)}&per_page=20&orientation=landscape`,
      { headers: { Authorization: KEY } });
    const data = await res.json();
    const photos = data.photos || [];
    if (photos.length) {
      const photo = photos[Math.floor(Math.random() * photos.length)];
      document.body.style.backgroundImage = `url('${photo.src.large2x}')`;
    }
  } catch(e) {}
})();

/* ===== 日付管理 ===== */
const DAYS_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_JP = ['日','月','火','水','木','金','土'];
let currentDate = new Date();
let weekMode = false;
let weekDays = [];   // {day, events}[7]
let weekPairIdx = 0; // 表示中の先頭インデックス（0,2,4,6）

function dateOnly(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmtHeader(d) { return `${d.getMonth()+1}/${d.getDate()}  (${DAYS_EN[d.getDay()]})`; }

function setNavActive(id) {
  ['btn-today','btn-tomorrow','btn-dayafter','btn-week'].forEach(b => {
    document.getElementById(b).classList.remove('active');
  });
  if (id) document.getElementById(id).classList.add('active');
}

function showSinglePage() {
  document.getElementById('page').style.display = '';
  document.getElementById('week-viewer').classList.remove('visible');
  document.getElementById('week-nav').classList.remove('visible');
}
function showWeekView() {
  document.getElementById('page').style.display = 'none';
  document.getElementById('week-viewer').classList.add('visible');
  document.getElementById('week-nav').classList.add('visible');
}

function selectDay(offset) {
  weekMode = false;
  currentDate = addDays(dateOnly(new Date()), offset);
  showSinglePage();
  document.getElementById('date-display').textContent = fmtHeader(currentDate);
  const ids = ['btn-today','btn-tomorrow','btn-dayafter'];
  setNavActive(ids[offset] || null);
  if (accessToken) loadCalendarFor(currentDate); else render();
}

function shiftDay(n) {
  if (weekMode) return;
  currentDate = addDays(currentDate, n);
  document.getElementById('date-display').textContent = fmtHeader(currentDate);
  setNavActive(null);
  if (accessToken) loadCalendarFor(currentDate); else render();
}

function selectDate(val) {
  if (!val) return;
  weekMode = false;
  const [y,m,d] = val.split('-').map(Number);
  currentDate = new Date(y, m-1, d);
  showSinglePage();
  document.getElementById('date-display').textContent = fmtHeader(currentDate);
  setNavActive(null);
  if (accessToken) loadCalendarFor(currentDate); else render();
}

let weekBaseMonday = null;

async function selectWeek() {
  const today = dateOnly(new Date());
  const dow = today.getDay();
  weekBaseMonday = addDays(today, -(dow === 0 ? 6 : dow - 1));
  await loadWeek();
}

async function shiftWeek(dir) {
  weekBaseMonday = addDays(weekBaseMonday, dir * 7);
  await loadWeek();
}

async function loadWeek() {
  weekMode = true;
  setNavActive('btn-week');
  showWeekView();
  document.getElementById('week-nav-label').textContent = '読み込み中...';

  weekDays = [];
  for (let i = 0; i < 7; i++) {
    const day = addDays(weekBaseMonday, i);
    const events = accessToken ? await fetchEventsFor(day) : [];
    weekDays.push({ day, events });
  }

  const track = document.getElementById('week-track');
  track.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    track.appendChild(buildWeekPage(weekDays[i].day, weekDays[i].events));
  }

  weekPairIdx = 0;
  document.getElementById('week-viewer').scrollTo({ left: 0, behavior: 'instant' });
  updateWeekNav();
}

function shiftWeekPair(dir) {
  const next = weekPairIdx + dir;
  if (next < 0 || next > 5) return;
  weekPairIdx = next;
  // 1ページ分スクロール（ページ幅 + gap 20px）
  const pageW = document.querySelector('.week-page').offsetWidth;
  document.getElementById('week-viewer').scrollTo({ left: weekPairIdx * (pageW + 20), behavior: 'smooth' });
  updateWeekNav();
}

function updateWeekNav() {
  const dayA = weekDays[weekPairIdx].day;
  const dayB = weekDays[Math.min(weekPairIdx + 1, 6)].day;
  const f = d => `${d.getMonth()+1}/${d.getDate()}(${DAYS_JP[d.getDay()]})`;
  document.getElementById('week-nav-label').textContent = `${f(dayA)} — ${f(dayB)}`;
  document.getElementById('week-prev').disabled = (weekPairIdx === 0);
  document.getElementById('week-next').disabled = (weekPairIdx >= 5);
}

function buildWeekPage(day, events) {
  const pg = document.createElement('div');
  pg.className = 'week-page';

  // ヘッダー
  const hdr = document.createElement('div');
  hdr.className = 'wp-hdr';
  hdr.innerHTML = `
    <div style="font-family:'Segoe Script',cursive;font-size:20px;min-width:110px">${fmtHeader(day)}</div>
    <div class="hfields">
      <span class="hf wx"><label>WX:</label><input type="text"/></span>
      <span class="hf"><label>PS:</label><input type="text"/></span>
      <span class="hf"><label>MS:</label><input type="text"/></span>
      <span class="hf st"><label>ST:</label><input type="text"/></span>
      <span class="hf"><label>feel:</label><input type="text"/></span>
      <span class="hf no"><label>No.</label><input type="text"/></span>
    </div>`;
  pg.appendChild(hdr);
  const hdr2 = document.createElement('div');
  hdr2.className = 'wp-hdr2';
  pg.appendChild(hdr2);

  // タイトル行
  const tr = document.createElement('div');
  tr.className = 'wp-title';
  tr.innerHTML = `<span style="font-family:'Segoe Script',cursive;font-size:20px;color:#888;margin-right:6px">Title:</span><input type="text" style="flex:1;border:none;background:transparent;font-size:14px;font-family:'Segoe Script',cursive;color:#1a3a5c;outline:none"/>`;
  pg.appendChild(tr);

  // 本文
  const body = document.createElement('div');
  body.className = 'wp-body';
  for (let i = 0; i < 25; i++) {
    const ev = events[i];
    body.appendChild(ev ? makeRow(ev.timeStr, ev.calname, ev.detail) : makeRow());
  }
  pg.appendChild(body);
  return pg;
}

/* 初期表示 */
document.getElementById('date-display').textContent = fmtHeader(currentDate);

/* ===== 行生成 ===== */
let calColorMap = {};

const _cnCanvas = document.createElement('canvas');
function fitCalname(el) {
  const ctx = _cnCanvas.getContext('2d');
  ctx.font = 'italic 9.5px "Segoe UI", Meiryo, sans-serif';
  const textPx = ctx.measureText(el.value).width + 4; // +4 for padding
  const basePx = 26 * 3.7795; // 26mm in px at 96dpi
  el.style.width = Math.max(basePx, textPx) + 'px';
  el.style.minWidth = el.style.width;
}

function makeRow(time, calname, detail) {
  const empty = !time && !calname && !detail;
  const row = document.createElement('div');
  row.className = 'row' + (empty ? ' empty-row' : ' has-event');

  // bullet
  const b = document.createElement('div');
  b.className = 'col-bullet';
  b.textContent = '•';
  row.appendChild(b);

  // 時間
  const ct = document.createElement('div');
  ct.className = 'col-time';
  const it = document.createElement('input');
  it.type = 'text';
  it.value = time || '';
  ct.appendChild(it);
  row.appendChild(ct);

  // カレンダー名（編集可能input）＋予定名
  const cd = document.createElement('div');
  cd.className = 'col-detail';
  const ic = document.createElement('input');
  ic.type = 'text';
  ic.className = 'col-calname';
  ic.value = calname || '';
  ic.style.color = calname ? (calColorMap[calname] || '#888') : '#bbb';
  fitCalname(ic);
  cd.appendChild(ic);
  const id = document.createElement('input');
  id.type = 'text';
  id.value = detail || '';
  cd.appendChild(id);
  row.appendChild(cd);

  // 削除ボタン
  const del = document.createElement('div');
  del.className = 'col-del';
  const db = document.createElement('button');
  db.textContent = '✕';
  db.title = '行を削除';
  db.addEventListener('click', () => deleteRow(row));
  del.appendChild(db);
  row.appendChild(del);

  // 入力で空行クラスを外す・calname幅を自動調整
  [it, ic, id].forEach(el => el.addEventListener('input', () => {
    row.classList.remove('empty-row');
    row.classList.add('has-event');
    if (el === ic) {
      fitCalname(ic);
      if (!ic.dataset.colored) ic.style.color = '#777';
    }
  }));
  return row;
}

function deleteRow(row) {
  const container = row.closest('#body-rows, .wp-body');
  if (!container) return;
  container.removeChild(row);
  container.appendChild(makeRow()); // 末尾に空白行を追加して25行維持
}

function render(events = []) {
  const container = document.getElementById('body-rows');
  container.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const ev = events[i];
    container.appendChild(ev ? makeRow(ev.timeStr, ev.calname, ev.detail) : makeRow());
  }
}
render();

/* ===== Google OAuth ===== */
const CLIENT_ID = '616683928852-chp1t7qqigfeeuolpcjbc8e14uueka8i.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';
let tokenClient, accessToken;

function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
    });
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) return;
        accessToken = resp.access_token;
        loadCalendar();
      },
    });
  });
}

function handleSignIn() {
  if (!tokenClient) { alert('Google APIの読み込み中です。少し待ってから再試行してください。'); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

const googleColors = {
  '1':'#a4bdfc','2':'#7ae7bf','3':'#dbadff','4':'#ff887c',
  '5':'#fbd75b','6':'#ffb878','7':'#46d6db','8':'#e1e1e1',
  '9':'#5484ed','10':'#51b749','11':'#dc2127'
};

async function fetchEventsFor(day) {
  const start = new Date(day.getFullYear(), day.getMonth(), day.getDate()).toISOString();
  const end   = new Date(day.getFullYear(), day.getMonth(), day.getDate() + 1).toISOString();
  const calList = await gapi.client.calendar.calendarList.list();
  const cals = calList.result.items || [];

  calColorMap = {};
  for (const cal of cals) {
    calColorMap[cal.summary] = cal.backgroundColor ||
      (cal.colorId ? googleColors[cal.colorId] : '#888');
  }

  const results = await Promise.all(cals.map(cal =>
    gapi.client.calendar.events.list({
      calendarId: cal.id, timeMin: start, timeMax: end,
      singleEvents: true, orderBy: 'startTime',
    }).then(r => ({ cal, events: r.result.items || [] }))
  ));

  const allEvents = [];
  for (const { cal, events } of results) {
    for (const ev of events) {
      const timeStr = ev.start.dateTime
        ? `${fmt(ev.start.dateTime)}〜${fmt(ev.end.dateTime)}`
        : '終日';
      allEvents.push({ timeStr, calname: cal.summary, detail: ev.summary || '', _sort: ev.start.dateTime || ev.start.date });
    }
  }
  allEvents.sort((a, b) => a._sort.localeCompare(b._sort));
  return allEvents;
}

async function loadCalendarFor(day) {
  if (!accessToken) return;
  try {
    const events = await fetchEventsFor(day);
    render(events);
    try {
      const me = await gapi.client.request({ path: 'https://www.googleapis.com/oauth2/v3/userinfo' });
      document.getElementById('user-info').textContent = me.result.email || '';
    } catch(_) {}
  } catch(e) {
    alert('読み込みエラー: ' + e.message);
  }
}

function loadCalendar() { loadCalendarFor(currentDate); }

function fmt(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
